<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sinal Escolar</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <meta name="apple-mobile-web-app-title" content="Sinal">
    <link rel="apple-touch-icon" href="icon-192.png">
    <style>
        #editorHorarios { display:none; background: #fff; padding: 20px; border-radius: 12px; color: #333; margin-top: 20px; border: 2px solid #ddd; text-align: left; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .item-horario { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; padding: 8px; background: #f0f0f0; border-radius: 6px; }
        .btn-excluir { background: #ff4d4d; color: white; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .controles-add { margin-top: 20px; display: flex; flex-direction: column; gap: 12px; padding-top: 15px; border-top: 2px solid #eee; }
        select, input[type="time"] { padding: 10px; border-radius: 6px; border: 1px solid #ccc; font-size: 16px; }
        .btn-acao { padding: 12px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; color: white; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Sinal Escolar Automático</h1>
        <div id="relogio">00:00:00</div>
        
        <button id="btnIniciar">ATIVAR SISTEMA</button>
        <p id="status">Sistema Inativo. Clique em ativar.</p>
        
        <div class="proximo-toque">
            Próximo sinal: <span id="proxSinal">--:--</span>
        </div>

        <button id="btnAbrirEditor" style="background: #444; margin-top: 30px;">⚙️ GERENCIAR HORÁRIOS</button>

        <div id="editorHorarios">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
                <h3 style="margin:0">Lista de Sinais</h3>
                <button onclick="resetarPadroes()" style="background: #ff9800; color: white; border:none; padding: 5px 10px; border-radius: 4px; font-size: 11px; cursor: pointer;">RESETAR PADRÕES</button>
            </div>

            <div id="listaHorariosUI"></div>
            
            <div class="controles-add">
                <strong>Adicionar ou Alterar:</strong>
                <input type="time" id="novoHora">
                <select id="novoSom">
                    <option value="somA1">Início (A1)</option>
                    <option value="somA2">Fim 1ª (A2)</option>
                    <option value="somA3">Fim 2ª (A3)</option>
                    <option value="somA4">Início Intervalo (A4)</option>
                    <option value="somA5">Aviso (A5)</option>
                    <option value="somA6">Fim Int./Início 4ª (A6)</option>
                    <option value="somA7">Início 5ª (A7)</option>
                    <option value="somA8">Início 6ª (A8)</option>
                    <option value="somA9">Saída (A9)</option>
                    <option value="somFim">Saída Especial (Fim)</option>
                </select>
                <button onclick="adicionarNovoHorario()" class="btn-acao" style="background: #28a745;">SALVAR / ALTERAR</button>
                <button onclick="fecharEditor()" class="btn-acao" style="background: #6c757d;">FECHAR</button>
            </div>
        </div>
    </div>

    <div style="display:none">
        <audio id="somIntro" src="sons/sinal.mp3"></audio>
        <audio id="somA1" src="sons/a1.mp3"></audio>
        <audio id="somA2" src="sons/a2.mp3"></audio>
        <audio id="somA3" src="sons/a3.mp3"></audio>
        <audio id="somA4" src="sons/a4.mp3"></audio> 
        <audio id="somA5" src="sons/a5.mp3"></audio> 
        <audio id="somA6" src="sons/a6.mp3"></audio> 
        <audio id="somA7" src="sons/a7.mp3"></audio> 
        <audio id="somA8" src="sons/a8.mp3"></audio> 
        <audio id="somA9" src="sons/a9.mp3"></audio> 
        <audio id="somFim" src="sons/fim.mp3"></audio>
    </div>

    <script src="script.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js')
            .then(() => console.log("SW OK"))
            .catch(err => console.log("SW Erro", err));
        }
    </script>
</body>
</html>
